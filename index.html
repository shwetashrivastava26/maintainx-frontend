<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaintainX Login</title>
</head>
<body style="
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: #1a2744;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
">

<div style="margin-bottom: 20px; text-align: center;">
    <h1 style="color: #93b4f0; font-size: 28px; margin: 0;">⚙ MaintainX</h1>
</div>

<div style="
    background: #ffffff;
    border-radius: 12px;
    padding: 36px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
">

    <h2 style="
        text-align: center;
        color: #1a2744;
        font-size: 22px;
        margin: 0 0 28px;
    ">Login</h2>

    <label style="font-size: 14px; color: #444; display: block; margin-bottom: 6px;">User Role</label>
    <select id="role" style="
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 16px;
        background: #ffffff;
        color: #333;
        outline: none;
    ">
        <option value="admin">Admin</option>
        <option value="employee">Employee</option>
        <option value="tracker">Maintenance Tracker</option>
    </select>

    <label style="font-size: 14px; color: #444; display: block; margin-bottom: 6px;">Username</label>
    <input type="text" id="username" style="
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 16px;
        background: #ffffff;
        color: #333;
        outline: none;
        box-sizing: border-box;
    ">

    <label style="font-size: 14px; color: #444; display: block; margin-bottom: 6px;">Password</label>
    <input type="password" id="password" style="
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 24px;
        background: #ffffff;
        color: #333;
        outline: none;
        box-sizing: border-box;
    ">

    <button onclick="login()" style="
        width: 100%;
        padding: 12px;
        background: #1a2744;
        color: #ffffff;
        border: none;
        border-radius: 6px;
        font-size: 15px;
        cursor: pointer;
        transition: background 0.3s;
    "
    onmouseover="this.style.background='#243660'"
    onmouseout="this.style.background='#1a2744'"
    >Login</button>

    <p id="message" style="
        text-align: center;
        color: red;
        font-size: 13px;
        margin-top: 12px;
    "></p>

</div>

<script src="script.js"></script>

</body>
</html>
